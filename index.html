<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <!-- CSP headers -->
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests"/>
        <!-- Primary Meta Tags -->
        <title>
            Around the World
        </title>
        <meta name="author" content="ODCenteno"/>
        <meta name="description" content="A trip around Asia, Latin America, and Europe."/>
        <meta name="title" content="Around the World"/>
        <meta name="keywords" content="html, css, javascript, blog, traveling"/>
        <link rel="icon" type="image/svg+xml" href="./images/favicon.svg"/>
        <meta name="theme-color" content="#000"/>
        <!-- Synchronous CSS -->
        <link rel="stylesheet" href="./pages/index.css"/>
        <!-- Open Graph / Facebook -->
        <meta property="og:locale" content="en"/>
        <meta property="og:type" content="website"/>
        <meta property="og:title" content="Your Page Title"/>
        <meta property="og:description" content="Brief description"/>
        <meta property="og:image" content="/some-image.png"/>
        <meta property="og:url" content="/this-page.html"/>
        <meta property="og:site_name" content="Your Site Name"/>
    </head>
    <body>
        <div class="page">
            <header class="header page__header">
                <div class="header__logo-container">
                    <img src="./images/logo.svg" alt="Around logo" class="header__logo"/>
                </div>
                <hr class="header__divisor"/>
                <nav class="nav header__nav">
                    <div class="nav__avatar-container nav__avatar-position">
                        <img src="./images/QVVQ.webp" alt="QVVQ logo" class="nav__avatar"/>
                    </div>
                    <div class="nav__container">
                        <div class="nav__name-edit">
                            <h1 class="nav__name">
                                QV/VQ
                            </h1>
                            <button class="button nav__button-edit" id="button-edit"></button>
                        </div>
                        <p class="nav__job-title">
                            Traveler
                        </p>
                    </div>
                    <button type="button" class="button nav__button-add"></button>
                </nav>
            </header>
            <main class="main">
                <section id="articles" class="articles"></section>
                <aside class="popup popup_hidden">
                    <form id="form-profile" class="popup__container" name="edit-form" action="/" method="post">
                        <button type="reset" class="button popup__button-close" id="popup-button-close"></button>
                        <h2 class="popup__title">
                            Edit Profile
                        </h2>
                        <fieldset class="popup__fields">
                            <input type="text" class="popup__input" id="form-name" name="edit-name" placeholder="Name" minlength="2" required/>
                            <input type="text" class="popup__input" id="form-description" name="edit-description" minlength="2" placeholder="About me" required/>
                        </fieldset>
                        <button type="submit" class="button popup__button-submit" id="popup-button-submit" disabled>
                            Save
                        </button>
                    </form>
                </aside>
            </main>
            <footer class="footer">
                <p class="footer__copy">
                    &copy; 2025 Around The World by
                    <a href="#" target="_blank">
                        FDSC
                    </a>
                </p>
            </footer>
        </div>
        <script src="./scripts/index.js"></script>
        <script src="./scripts/articles.js"></script>
    </body>
</html>
